<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONELGAZ ELE MT - Évaluation Technique</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <div id="app" class="flex-grow flex items-center justify-center p-4">
        <!-- Contenu dynamique -->
    </div>

    <script>
        // --- BANQUE DE QUESTIONS RÉELLES (Extrait de QCM - Spécialité Exploitation) ---
        const bank = [
            { q: "Quelle est l'habilitation requise pour accomplir les opérations de consignation d'un ouvrage HT ?", options: ["H1", "H2", "HC", "H0"], correct: 2, justification: "L'habilitation HC (Chargé de Consignation) est la seule qui autorise à séparer, condamner et vérifier l'absence de tension sur un ouvrage." },
            { q: "Un agent possédant uniquement l'habilitation 'HC' peut-il participer physiquement aux travaux de réparation ?", options: ["Oui, s'il a consigné", "Non, nécessite H1 ou H2", "Oui, avec autorisation", "Oui, avec gants isolants"], correct: 1, justification: "Les périmètres sont stricts. Le HC consigne, le H1 exécute, le H2 dirige les travaux." },
            { q: "Qui est juridiquement responsable de la sécurité sur le chantier après l'AT ?", options: ["Chef de Consignation", "Dispatching", "Chef de Travaux", "Gardien"], correct: 2, justification: "Le Chef de Travaux (CDT) est responsable de l'exécution en sécurité une fois l'autorisation délivrée." },
            { q: "Pourquoi tester les gants isolants à l'air avant usage ?", options: ["Pour les sécher", "Vérifier micro-perforations", "Confort", "Procédure inutile"], correct: 1, justification: "Le moindre micro-trou annule toute l'isolation diélectrique." },
            { q: "Que faire lors du réarmement manuel d'un moteur de sectionneur ?", options: ["Être très fort", "Couper l'alimentation du moteur", "Mettre de l'huile", "Appeler le Dispatching"], correct: 1, justification: "Il faut toujours couper l'alimentation (disjoncteur du moteur) avant d'engager la manivelle pour éviter les bris de bras." },
            { q: "En cas de phénomène de 'Tracking' sur les isolateurs (brouillard/pollution) ?", options: ["Nettoyer au chiffon", "Lavage sous tension ou mise hors tension", "Augmenter la tension", "Jeter du sable"], correct: 1, justification: "Le Dispatching organise un lavage des isolateurs sous tension ou met la ligne hors tension si le risque de flashover est imminent." },
            { q: "Quel dispositif protège le transformateur contre les surcharges ?", options: ["Relais Buchholz", "Disjoncteur BT", "Éclateur", "Fusible HT"], correct: 1, justification: "Le disjoncteur BT ou le relais de protection assurent la protection thermique." },
            { q: "Qu'est-ce qu'un point chaud sur un IACM ?", options: ["Fuite SF6", "Résistance de contact élevée", "Tension élevée", "Rien"], correct: 1, justification: "Indique une dégradation des contacts par oxydation." }
            // Ajoutez ici les 92 questions restantes en suivant ce format
        ];

        // Remplissage temporaire pour éviter les erreurs de code si le tableau n'a pas 100 items
        const fullBank = [...bank, ...Array.from({ length: 100 - bank.length }, (_, i) => ({
            q: `Question technique #${i + bank.length + 1} (À venir)`,
            options: ["Option A", "Option B", "Option C", "Option D"],
            correct: 0,
            justification: "Question en attente d'intégration."
        }))];

        let state = { view: 'home', currQ: 0, score: 0, selOpt: null, showCorrection: false, candidat: '' };

        const render = () => {
            const app = document.getElementById('app');
            if (state.view === 'home') {
                app.innerHTML = `
                    <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center text-slate-900">
                        <h1 class="text-3xl font-black mb-2 uppercase">SONELGAZ ELE MT</h1>
                        <p class="text-slate-500 mb-8 font-medium">Évaluation Technique - 100 Questions</p>
                        <input id="nameInput" class="w-full p-4 mb-4 bg-slate-100 rounded-xl border-2" placeholder="Nom du candidat" value="${state.candidat}">
                        <button onclick="startQuiz()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white hover:bg-blue-500 transition">Démarrer le Test</button>
                    </div>`;
            } else {
                const q = fullBank[state.currQ];
                app.innerHTML = `
                    <div class="max-w-3xl w-full bg-white p-8 rounded-3xl shadow-2xl text-slate-900">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-sm font-bold text-blue-700">Question ${state.currQ + 1} / ${fullBank.length}</span>
                            <button onclick="quit()" class="text-red-500 font-bold text-xs uppercase">Quitter</button>
                        </div>
                        <h2 class="text-2xl font-bold mb-6">${q.q}</h2>
                        <div class="space-y-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="select(${i})" class="w-full p-4 rounded-xl border-2 font-medium text-left transition ${
                                    state.showCorrection ? (i === q.correct ? 'bg-emerald-500 text-white' : (state.selOpt === i ? 'bg-rose-500 text-white' : 'bg-slate-50')) 
                                    : (state.selOpt === i ? 'bg-blue-600 text-white border-blue-600' : 'hover:bg-slate-50')
                                }">${opt}</button>
                            `).join('')}
                        </div>
                        ${state.showCorrection ? `<div class="mt-6 p-4 bg-blue-50 border-l-4 border-blue-600 text-blue-900 italic">${q.justification}</div>` : ''}
                        <div class="flex gap-4 mt-8">
                            <button onclick="prev()" class="flex-1 py-3 bg-slate-200 rounded-xl font-bold">Retour</button>
                            <button onclick="next()" class="flex-1 py-3 bg-slate-900 text-white rounded-xl font-bold">${state.showCorrection ? 'Suivant' : 'Valider'}</button>
                        </div>
                    </div>`;
            }
        };

        window.startQuiz = () => { state.candidat = document.getElementById('nameInput').value; state.view = 'quiz'; render(); };
        window.select = (i) => { if (!state.showCorrection) { state.selOpt = i; render(); } };
        window.next = () => {
            if (state.showCorrection) {
                if (state.currQ + 1 < fullBank.length) { state.currQ++; state.selOpt = null; state.showCorrection = false; }
                else { state.view = 'home'; state.score = 0; state.currQ = 0; }
            } else { if (state.selOpt !== null) state.showCorrection = true; }
            render();
        };
        window.prev = () => { if (state.currQ > 0) { state.currQ--; state.selOpt = null; state.showCorrection = false; render(); } };
        window.quit = () => { state.view = 'home'; render(); };
        render();
    </script>
</body>
</html>
